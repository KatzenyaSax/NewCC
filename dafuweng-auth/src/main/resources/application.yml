server:
  port: 8081

spring:
  application:
    name: dafuweng-auth
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:dafuweng_auth}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: ${DB_USER:root}
    password: ${DB_PWD:root123}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PWD:}
    database: ${REDIS_DB:0}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.dafuweng.auth.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Redisson
redisson:
  address: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
  password: ${REDIS_PWD:}
  database: ${REDIS_DB:0}

# Nacos 服务注册
spring.cloud.nacos.discovery:
  namespace: ${NACOS_NAMESPACE:public}
  group: ${NACOS_GROUP:DEFAULT_GROUP}
  enabled: true

# JWT配置
jwt:
  secret: ${JWT_SECRET:dafuweng-secret-key-for-jwt-token-signing-must-be-at-least-256-bits}
  expiration: 86400000     # 24小时
  refresh-expiration: 604800000  # 7天

# OpenFeign
spring.cloud.openfeign:
  client:
    config:
      default:
        connectTimeout: 10000
        readTimeout: 30000
